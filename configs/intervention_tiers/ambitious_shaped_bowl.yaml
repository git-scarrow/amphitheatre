# Ambitious tier — deliberate bowl shaping: everything in the optimized tier
# PLUS regrading the upper rows (19-20 promoted + re-risered) so the whole
# envelope reaches formal C >= 90 mm, with cut/fill caps raised to 3 ft.
# Cut/fill depth and wall-trigger reporting are MANDATORY at this tier
# (gate-enforced).
recipe:
  name: ambitious_shaped_bowl
  tier_class: ambitious
  intent: >
    Shape the bowl, not just finish it: promote rows 19-20 in all sections
    and regrade them to the C>=90 profile, regrade any soft mid-bowl rows to
    a 100 mm comfort target, adopt the P_opt stage placement + three-facet
    apron, extend the east flank. Earthwork is allowed to lead where the
    terrain is close.
  base_geometry:
    scheme: scenarioE_three_section_civic_bowl
    treads: analysis/scenarioE_civic/geometry.geojson
    composition: design_extended_bays/composition_table.csv
    bays: design_extended_bays/seating_bays.geojson
    earthwork: analysis/scenarioE_civic/earthwork.csv
  allowed_operations:
    - add_row
    - extend_section_arc
    - regrade_rows
    - smooth_row_end_shoulders
    - solve_cross_aisle_plane
    - refit_stage
    - faceted_apron
    - select_borrow_zone
  operations:
    - op: add_row
      sections: [east, bend, south]
      row: 19
    - op: add_row
      sections: [east, bend, south]
      row: 20
    - op: regrade_rows
      sections: [east, bend, south]
      rows: [11, 12, 13, 14, 15, 16, 17, 18]
      target_c_mm: 100
      only_if_below: true
      note: "lift any upper-civic row below 100 mm to a comfort margin (BEFORE re-risering rows 19-20, which chain off row 18)"
    - op: regrade_rows
      sections: [east, bend, south]
      rows: [19, 20]
      target_c_mm: 90
      note: "promoted rows re-risered to the formal profile"
    - op: extend_section_arc
      section: east
      arc_ft: 342.0
      seats: 149
      cy_proxy: 11.4
      rows: [6, 18]
      provenance: "NORMALIZATION.md N1"
    - op: refit_stage
      candidate: P_opt
      axis_az: 150.0
      solve_from_residuals: true
      study_mismatch_deg: -6.3   # STAGE_SHAPE_STUDY sign (= +6.3 in sweep/evaluator sign)
      study_lateral_ft: -6.7     # residual lateral, same sign in all frames
      row1_gap_ft: {east: 12.0, bend: 32.7, south: 21.9}
      cell_gap_ft: 32.0
      bay_obstruction_pct: 0.0
      foreground_obstruction_pct: 1.7
      earthwork_cy: 37.8
      rule9_status: open_candidate
    - op: faceted_apron
      front: five_facet_apron
      apron_sf: 319
      projection_ft: 6.0
      row1_gap_ft: {east: 12.0, bend: 29.6, south: 18.8}
      performer_to_row1_ft: {east: 38.4, bend: 34.0, south: 33.5}
      bend_delta_ft: -5.6
      bay_obstruction_pct: 0.0
      foreground_obstruction_pct: 1.1
    - op: smooth_row_end_shoulders
      treatment: topsoil_only
      extra_topsoil_cy: 12.0
    - op: solve_cross_aisle_plane
      cross_slope_pct: 2.0
      long_slope_pct: 1.0
      cy_delta: 4.0
    - op: select_borrow_zone
      zone: upper_plateau_borrow
      note: "upper-plateau cut feeds promoted-row fill; short downhill haul"
  constraints:
    max_cut_ft: 3.0
    max_fill_ft: 3.0
    wall_trigger_cut_ft: 3.0
    wall_trigger_fill_ft: 3.0
    preserve: [treatment_cell, bay_view_corridor, drainage_swales]
  scoring_weights: {}
  notes: >
    Walls are an emergent OUTPUT: any band whose regrade depth exceeds the
    wall trigger is reported with an estimated wall length, never silently
    capped away.
