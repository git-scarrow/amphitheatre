name: speckle-server

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    <<: *restart
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: speckle
      POSTGRES_USER: speckle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /srv/speckle/postgres-data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speckle -d speckle"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *restart
    image: valkey/valkey:8-alpine
    volumes:
      - /srv/speckle/redis-data:/data

  minio:
    <<: *restart
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "127.0.0.1:9001:9001"   # console only, host-loopback (SSH-tunnel to reach)
    volumes:
      - /srv/speckle/minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # NOTE: the upstream speckle-docker-compose-ingress:2 image ships a broken
  # nginx.conf (emits `pcre_jit` into the http include context -> crash-loop).
  # Caddy reproduces its exact route map directly (see Caddyfile), so the
  # separate ingress container is intentionally omitted.

  speckle-frontend-2:
    <<: *restart
    image: speckle/speckle-frontend-2:2
    environment:
      NUXT_PUBLIC_SERVER_NAME: "petoskey-pit"
      NUXT_PUBLIC_API_ORIGIN: ${CANONICAL_URL}
      NUXT_PUBLIC_BACKEND_API_ORIGIN: "http://speckle-server:3000"
      NUXT_PUBLIC_BASE_URL: ${CANONICAL_URL}
      NUXT_REDIS_URL: "redis://redis"
      NUXT_PUBLIC_SSL_ENABLED: "true"

  speckle-server:
    <<: *restart
    image: speckle/speckle-server:2
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      minio:    { condition: service_started }
    environment:
      CANONICAL_URL: ${CANONICAL_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      STRATEGY_LOCAL: "true"
      POSTGRES_URL: "postgres"
      POSTGRES_USER: "speckle"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "speckle"
      REDIS_URL: "redis://redis"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "${CANONICAL_URL}/minio"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: "speckle-server"
      S3_CREATE_BUCKET: "true"
      FRONTEND_ORIGIN: ${CANONICAL_URL}
      EMAIL: "false"

  preview-service:
    <<: *restart
    image: speckle/speckle-preview-service:2
    depends_on: [speckle-server]
    environment:
      REDIS_URL: "redis://redis"
      PORT: "3001"

  webhook-service:
    <<: *restart
    image: speckle/speckle-webhook-service:2
    depends_on: [speckle-server]
    environment:
      PG_CONNECTION_STRING: "postgres://speckle:${POSTGRES_PASSWORD}@postgres/speckle"

  fileimport-service:
    <<: *restart
    image: speckle/speckle-fileimport-service:2
    depends_on: [speckle-server]
    environment:
      SPECKLE_SERVER_URL: "http://speckle-server:3000"
      REDIS_URL: "redis://redis"
      PG_CONNECTION_STRING: "postgres://speckle:${POSTGRES_PASSWORD}@postgres/speckle"

  caddy:
    <<: *restart
    image: caddy:2-alpine
    ports:
      # Published ONLY on the tailnet interface IP — no public/LAN exposure.
      - "${TS_BIND}:443:443"
      - "${TS_BIND}:80:80"
    volumes:
      - /srv/speckle/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/speckle/caddy-data:/data
    depends_on: [speckle-frontend-2, speckle-server]
