proposal:
  id: V_SLOPE_GRADE
  family: B
  intent: >
    Per-row slope regularization via flatten_pad on 16 row-tread bands.
    Anchors tread at row-1 natural grade. Applies 24%/31%/33% three-zone
    slope profile. All cuts; no fill in seating zone. Earthwork balanced
    to lower_basin_dry_shelf. All constraints must pass.
  bowl_axis_az: 330
  borrow_only_ok: true

  actions:
    - flatten_pad:
        polygon: row_band_01
        target_elev: 613.5397338867188
    - flatten_pad:
        polygon: row_band_02
        target_elev: 614.26
    - flatten_pad:
        polygon: row_band_03
        target_elev: 614.98
